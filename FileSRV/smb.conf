[global]
workgroup = *******
realm = *******
security = ADS
netbios name = astra-samba

# syslog = 0
log file = /var/log/samba/log.%h
max log size = 1000
dns proxy = No
winbind enum users = No
winbind enum groups = No
winbind use default domain = Yes
winbind nss info = rfc2307
winbind refresh tickets = yes
winbind offline logon = yes

client min protocol = SMB2
server min protocol = SMB2


idmap config * : backend = tdb
idmap config * : range = 200000-999999
idmap config GAP_RT : backend = ad
idmap config GAP_RT : range = 1000000-1999999
idmap config GAP_RT : unix_nss_info = yes
idmap config GAP_RT : schema_mode = rfc2307

kerberos method = system keytab

#[printers]
# comment = All Printers
# path = /var/tmp
# printable = Yes
# read only = Yes

#[print$]
# comment = Printer Drivers
# path = /var/lib/samba/printers
# browseable = yes
# read only = yes

[shared]
path = /srv/samba/shared_folder
read only = yes
valid users = "@*******", "@*******"
invalid users = "@*******1"
read list = "@*******"
write list = "@*******"
inherit acls = Yes
force group = "!*******"
create mask = 0660
directory mask = 0770
